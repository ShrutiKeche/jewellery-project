{% extends 'base.html' %}
{% load static %}

{% block title %}Login – JewellsMart{% endblock %}

{% block extra_css %}
<style>
.login-container-wrapper {
background: linear-gradient(
rgba(0,0,0,0.4),
rgba(0,0,0,0.6)
),
url("{% static 'images/login1.jpeg' %}");
background-size: cover;
background-position: center;
padding: 100px 0;
display: flex;
justify-content: center;
align-items: center;
}

.login-box {
width: 380px;
padding: 40px 35px;
border-radius: 16px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.25);
box-shadow: 0 0 25px rgba(255,255,255,0.2);
text-align: center;
}

.login-box h2 {
font-size: 28px;
font-weight: 600;
color: #fff;
letter-spacing: 2px;
margin-bottom: 10px;
text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.subtitle {
color: #f5d57a;
font-size: 17px;
margin-bottom: 25px;
letter-spacing: 3px;
text-transform: uppercase;
font-weight: 500;
}

.login-box input {
width: 100%;
padding: 12px 14px;
margin-bottom: 15px;
border: none;
border-radius: 6px;
font-size: 16px;
outline: none;
background: rgba(255,255,255,0.85);
}

.login-btn {
width: 100%;
padding: 12px;
border: none;
border-radius: 6px;
font-size: 17px;
cursor: pointer;
background: linear-gradient(45deg, #ff007b, #ffbc00);
color: white;
font-weight: 600;
transition: 0.3s;
box-shadow: 0px 0px 12px rgba(255, 193, 7, 0.4);
}

.login-btn:hover {
transform: scale(1.03);
box-shadow: 0px 0px 20px rgba(255, 181, 0, 0.7);
}

.error-msg{
color: #ffdddd;
margin-top: 12px;
font-size: 14px;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container-wrapper">
  <div class="login-box">
    <h2>LOGIN</h2>
    <div class="subtitle">JEWELLS MART</div>

    <!-- ✅ DATABASE LOGIN FORM -->
    <form method="POST">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button class="login-btn" type="submit">Login</button>
    </form>

    <!-- ✅ ERROR / SUCCESS MESSAGE -->
    {% for message in messages %}
    <p class="error-msg">{{ message }}</p>
    {% endfor %}

  </div>
</div>
{% endblock %}
